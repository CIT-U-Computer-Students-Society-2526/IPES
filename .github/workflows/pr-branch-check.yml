name: Enforce Main Target Rules

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  check-branch-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch for main target
        if: github.base_ref == 'main' && github.head_ref != 'dev'
        run: |
          echo "::error::Strict Branching Policy: The 'main' branch can only be updated from the 'dev' branch via PR."
          echo "Your PR is currently attempting to merge '${{ github.head_ref }}' into 'main'."
          exit 1
      
      - name: Success message
        if: github.base_ref == 'main' && github.head_ref == 'dev'
        run: |
          echo "Branch check passed: Merging 'dev' into 'main' is allowed."
