name: Mark and Close Stale PRs

on:
  schedule:
    - cron: '30 1 * * *' # Runs daily at 01:30 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark Stale Branches and PRs
        uses: actions/stale@v10
        with:
          # Settings for PRs
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity for 30 days. It will be closed in 7 days if no further activity occurs. Thank you for your contributions.'
          close-pr-message: 'This PR was closed because it has been stalled for 7 days with no activity.'
          
          # Disable marking issues as stale
          days-before-issue-stale: -1
          days-before-issue-close: -1
