name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  # GATEKEEPER: Ensures the PR targets the correct branch before anything else runs
  check-target-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce dev branch target
        uses: Vankka/pr-target-branch-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # If target is main, it will fail and comment
          target: "main" 
          # We want it to stay on dev
          exclude: "dev"
          comment: |
            ⚠️ **Target Branch Error**
            Your PR is targeting `main`. Please change the base branch to `dev`.
            All feature contributions must be merged into `dev` first for integration testing.

  build-backend:
    needs: check-target-branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        continue-on-error: true
        run: flake8 .

  build-frontend:
    needs: check-target-branch
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build & Lint
        run: |
          npm run lint || true
          npm run build
